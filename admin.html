<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>mira — owner dashboard</title>
  <meta name="robots" content="noindex">
  <link rel="icon" type="image/png" href="/assets/favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css?v=45">
  <style>
    body { cursor: auto; background: var(--cream); }
    .adm { max-width: 1120px; margin: 0 auto; padding: 1.4rem var(--pad) 5rem; }
    .adm__grid { display: grid; grid-template-columns: minmax(0, 7fr) minmax(0, 4fr); gap: 1.1rem; align-items: start; }
    .adm__col { display: grid; gap: 1.1rem; min-width: 0; }
    .adm__col .box { margin-bottom: 0; }
    @media (max-width: 900px) { .adm__grid { grid-template-columns: 1fr; } }
    .adm__nav { display: flex; align-items: center; justify-content: space-between; padding: .4rem 0 2rem; }
    .adm__nav img { height: 30px; }
    .adm__nav a { font-family: var(--font-mono); font-size: .85rem; text-decoration: underline; text-underline-offset: .25em; }
    h1 { font-size: clamp(2rem, 5vw, 2.8rem); font-weight: 700; letter-spacing: -.02em; margin-bottom: 1.6rem; }
    .box { border: 3px solid var(--ink); border-radius: 16px; background: #fff; padding: 1.2rem 1.4rem; margin-bottom: 1rem; }
    .box h2 { font-size: 1rem; font-weight: 700; margin-bottom: .8rem; }
    .row { display: flex; align-items: center; justify-content: space-between; gap: 1rem; padding: .5rem 0; font-size: .95rem; }
    .mono { font-family: var(--font-mono); }
    .bigbtn { width: 100%; font-family: var(--font-mono); font-size: 1rem; font-weight: 700; padding: 1rem; border-radius: 999px; border: 3px solid var(--ink); cursor: pointer; }
    .bigbtn.open { background: var(--green); color: var(--ink); }
    .bigbtn.paused { background: var(--oxblood); color: var(--cream); }
    input[type="number"] { font-family: var(--font-mono); font-size: 1rem; width: 5.5rem; padding: .5rem; border: 2px solid var(--ink); border-radius: 10px; text-align: center; }
    .small { font-family: var(--font-mono); font-size: .72rem; opacity: .65; line-height: 1.6; margin-top: .6rem; }
    .save { font-family: var(--font-mono); font-size: .85rem; padding: .7rem 1.6rem; border-radius: 999px; border: 2px solid var(--ink); background: var(--ink); color: var(--cream); cursor: pointer; }
    .ghost { background: none; color: var(--ink); }
    .msg { font-family: var(--font-mono); font-size: .8rem; min-height: 1.4em; margin-top: .6rem; }
    .links a { display: inline-block; font-family: var(--font-mono); font-size: .8rem; text-decoration: underline; text-underline-offset: .25em; margin-right: 1.2rem; }
    .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: .7rem; margin-bottom: 1rem; }
    .kpi { border: 2px solid var(--cream-dim); border-radius: 12px; padding: .7rem .85rem; display: grid; gap: .3rem; align-content: start; }
    .kpi__label { font-family: var(--font-mono); font-size: .62rem; text-transform: uppercase; letter-spacing: .12em; opacity: .55; }
    .kpi__value { font-family: var(--font-mono); font-size: 1.55rem; font-weight: 700; font-variant-numeric: tabular-nums; letter-spacing: -.02em; }
    .kpi__foot { display: flex; align-items: center; gap: .45rem; flex-wrap: wrap; }
    .kpi__sub { font-family: var(--font-mono); font-size: .62rem; opacity: .5; }
    .kpi__chip { font-family: var(--font-mono); font-size: .62rem; font-weight: 700; padding: .1rem .45rem; border-radius: 999px; }
    .kpi__chip--up { background: #e3f2e5; color: #20842c; }
    .kpi__chip--down { background: #f7e6e6; color: var(--oxblood); }
    .kpi__chip--flat { background: var(--cream-dim); color: var(--ink); opacity: .7; }
    .chart { margin-top: .4rem; }
    .chart__head { margin-bottom: .5rem; }
    .chart__peak { font-family: var(--font-mono); font-size: 11px; font-weight: 700; fill: var(--ink); }
    .chart__tick { font-family: var(--font-mono); font-size: 9.5px; fill: var(--ink); opacity: .45; }
    .inv-row { display: grid; grid-template-columns: minmax(0,2.2fr) 3.6rem 2.6rem 3rem minmax(0,1.6fr) 2.2rem 1.4rem; gap: .35rem; align-items: center; padding: .22rem 0; }
    .inv-row input { font-family: var(--font-mono); font-size: .78rem; padding: .35rem .45rem; border: 2px solid var(--cream-dim); border-radius: 8px; width: 100%; min-width: 0; }
    .inv-row input:focus { border-color: var(--ink); outline: none; }
    .inv-row .inv-qty, .inv-row .inv-low { text-align: center; }
    .inv-head { font-size: .6rem; text-transform: uppercase; letter-spacing: .1em; opacity: .5; }
    .inv-del { background: none; border: 0; font-size: 1rem; cursor: pointer; color: var(--oxblood); opacity: .6; }
    .inv-del:hover { opacity: 1; }
  </style>
</head>
<body>
  <div class="adm">
    <div class="adm__nav">
      <a href="/"><img src="assets/mira-wordmark.png" alt="mira"></a>
      <a href="/">← back to site</a>
    </div>
    <h1>owner dashboard.</h1>
    <div id="content"><p class="mono" style="font-size:.85rem">loading…</p></div>
  </div>

  <script>
  (async function () {
    const box = document.getElementById("content");
    let st;
    try { st = await (await fetch("/api/admin/state")).json(); } catch (e) { st = { error: "network" }; }

    if (st.error) {
      box.innerHTML = `<div class="box"><h2>sign in first</h2>
        <p style="font-size:.9rem;line-height:1.6">This page is owner-only. <a href="/account" style="text-decoration:underline">Sign in at /account</a> with the owner email (6-digit code), then come back here.</p></div>`;
      return;
    }

    const render = (s) => {
      box.innerHTML = `
      <div class="adm__grid">
        <div class="adm__col">
          <div class="box" id="salesBox">
            <h2>sales</h2>
            <p class="mono" style="font-size:.8rem;opacity:.6">loading…</p>
          </div>
          <div class="box" id="promoBox">
            <h2>promo codes</h2>
            <div id="promoList"><p class="mono" style="font-size:.8rem;opacity:.6">loading…</p></div>
            <div class="row" style="flex-wrap:wrap;gap:.5rem;margin-top:.8rem;border-top:2px solid var(--cream-dim);padding-top:.9rem">
              <input id="pc_code" placeholder="CODE (e.g. AMIGOS10)" maxlength="20"
                style="font-family:var(--font-mono);text-transform:uppercase;font-size:.85rem;padding:.5rem .7rem;border:2px solid var(--ink);border-radius:10px;flex:1;min-width:150px">
              <input id="pc_value" type="number" min="1" placeholder="10" style="width:4.5rem">
              <select id="pc_type" style="font-family:var(--font-mono);font-size:.85rem;padding:.5rem;border:2px solid var(--ink);border-radius:10px">
                <option value="percent">% off</option>
                <option value="amount">€ off</option>
              </select>
              <input id="pc_max" type="number" min="1" placeholder="uses" title="max uses (optional)" style="width:4.5rem">
              <input id="pc_days" type="number" min="1" placeholder="days" title="expires in N days (optional)" style="width:4.5rem">
              <button class="save" id="pc_create">create</button>
            </div>
            <p class="small">Customers type the code in checkout ("Add code"). "uses" + "days" optional. Discount hits products, not shipping; on subscriptions it applies to the first delivery.</p>
            <p class="msg" id="pc_msg"></p>
          </div>
        </div>
        <div class="adm__col">
          <div class="box">
            <h2>store status</h2>
            <button class="bigbtn ${s.open ? "open" : "paused"}" id="toggle">
              ${s.open ? "🟢 OPEN — customers can buy (tap to pause)" : "⏸ PAUSED — sales off (tap to open)"}
            </button>
            <p class="small">Paused = buy buttons show "coming soon", checkout API rejects everything. Site stays visible.</p>
          </div>
          <div class="box">
            <h2>stock — packs this round</h2>
            ${["small","medium","large"].map(k => `
              <div class="row"><span class="mono">${k}</span>
                <span class="mono" style="opacity:.6">sold ${s.sold[k]}</span>
                <span>cap <input type="number" min="0" max="9999" id="cap_${k}" value="${s.caps[k]}"></span>
                <span class="mono" style="font-weight:700">${Math.max(s.caps[k]-s.sold[k],0)} left</span>
              </div>`).join("")}
            <div class="row" style="margin-top:.6rem">
              <button class="save" id="save">save caps</button>
              <button class="save ghost" id="reset">reset sold → 0</button>
            </div>
            <p class="small">"left" at 0 = ESGOTADO sticker + checkout blocks it. Reset sold when a new baking round starts.</p>
            <p class="msg" id="msg"></p>
          </div>
          <div class="box" id="invBox">
            <h2>inventory <small style="font-family:var(--font-mono);font-weight:400;font-size:.68rem;text-transform:uppercase;letter-spacing:.1em;opacity:.55">ingredients &amp; packaging</small></h2>
            <div id="invRows"><p class="mono" style="font-size:.8rem;opacity:.6">loading…</p></div>
            <div class="row" style="margin-top:.6rem">
              <button class="save ghost" id="invAdd">+ add item</button>
              <button class="save" id="invSave">save inventory</button>
            </div>
            <p class="small">qty at or below "low" shows a warning — count after each baking round.</p>
            <p class="msg" id="invMsg"></p>
          </div>
          <div class="box links">
            <h2>quick links</h2>
            <a href="https://dashboard.stripe.com/payments" target="_blank">stripe payments</a>
            <a href="https://dash.cloudflare.com/77f21a888cac91e9fdbbf4d84bd068b1/web-analytics" target="_blank">visitor analytics</a>
            <a href="https://app.brevo.com" target="_blank">brevo</a>
            <a href="https://dash.cloudflare.com" target="_blank">cloudflare</a>
          </div>
        </div>
      </div>`;

      const post = async (body) => {
        document.getElementById("msg").textContent = "saving…";
        const r = await fetch("/api/admin/update", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body) });
        const d = await r.json();
        if (d.error) { document.getElementById("msg").textContent = d.error; return; }
        render(d);
      };
      document.getElementById("toggle").onclick = () => post({ open: !s.open });
      document.getElementById("save").onclick = () => post({ caps: {
        small: parseInt(document.getElementById("cap_small").value, 10),
        medium: parseInt(document.getElementById("cap_medium").value, 10),
        large: parseInt(document.getElementById("cap_large").value, 10),
      }});
      document.getElementById("reset").onclick = () => { if (confirm("Reset all sold counters to 0?")) post({ resetSold: true }); };
      loadStats();
      loadPromos();
      loadInventory();
      document.getElementById("pc_create").onclick = createPromo;
      document.getElementById("invAdd").onclick = () => addInvRow({});
      document.getElementById("invSave").onclick = saveInventory;
    };

    function invRowHtml(it) {
      const low = it.id && Number(it.qty) <= Number(it.low_at);
      return `
        <div class="inv-row" data-inv-id="${it.id || ""}">
          <input class="inv-name" value="${(it.name || "").replace(/"/g, "&quot;")}" placeholder="item">
          <input class="inv-qty" type="number" step="any" value="${it.qty ?? 0}" title="quantity">
          <input class="inv-unit" value="${(it.unit || "").replace(/"/g, "&quot;")}" placeholder="un" title="unit">
          <input class="inv-low" type="number" step="any" value="${it.low_at ?? 0}" title="warn at / low threshold">
          <input class="inv-sup" value="${(it.supplier || "").replace(/"/g, "&quot;")}" placeholder="supplier / fornecedor">
          <span class="inv-flag">${low ? '<span class="kpi__chip kpi__chip--down">low</span>' : ""}</span>
          <button class="inv-del" title="remove">×</button>
        </div>`;
    }

    function addInvRow(it) {
      const holder = document.getElementById("invRows");
      holder.insertAdjacentHTML("beforeend", invRowHtml(it));
      holder.querySelectorAll(".inv-del").forEach((b) => { b.onclick = () => delInvRow(b); });
    }

    async function delInvRow(btn) {
      const row = btn.closest(".inv-row");
      const id = row.dataset.invId;
      if (id && !confirm("Remove this item from inventory?")) return;
      if (id) await fetch("/api/admin/inventory-delete", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ id: Number(id) }) });
      row.remove();
    }

    async function loadInventory() {
      const holder = document.getElementById("invRows");
      if (!holder) return;
      try {
        const d = await (await fetch("/api/admin/inventory")).json();
        if (d.error) { holder.innerHTML = `<p class="small">${d.error}</p>`; return; }
        holder.innerHTML = `
          <div class="inv-row inv-head mono">
            <span>item</span><span>qty</span><span>unit</span><span>low</span><span>supplier</span><span></span><span></span>
          </div>`;
        d.items.forEach((it) => addInvRow(it));
      } catch (e) { holder.innerHTML = `<p class="small">inventory failed to load</p>`; }
    }

    async function saveInventory() {
      const msg = document.getElementById("invMsg");
      const items = [...document.querySelectorAll(".inv-row:not(.inv-head)")].map((r) => ({
        id: r.dataset.invId ? Number(r.dataset.invId) : null,
        name: r.querySelector(".inv-name").value,
        qty: r.querySelector(".inv-qty").value,
        unit: r.querySelector(".inv-unit").value,
        low_at: r.querySelector(".inv-low").value,
        supplier: r.querySelector(".inv-sup").value,
      }));
      msg.textContent = "saving…";
      try {
        const r = await fetch("/api/admin/inventory-save", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ items }) });
        const d = await r.json();
        msg.textContent = d.ok ? "saved ✓" : (d.error || "something went wrong");
        if (d.ok) loadInventory();
      } catch (e) { msg.textContent = "network error — try again"; }
    }

    async function loadPromos() {
      const el = document.getElementById("promoList");
      if (!el) return;
      try {
        const d = await (await fetch("/api/admin/promos")).json();
        if (d.error) { el.innerHTML = `<p class="small">${d.error}</p>`; return; }
        el.innerHTML = d.promos.length ? d.promos.map((p) => `
          <div class="row" style="font-size:.88rem">
            <span class="mono" style="font-weight:700;${p.active ? "" : "text-decoration:line-through;opacity:.45"}">${p.code}</span>
            <span class="mono" style="opacity:.7">${p.off} off · used ${p.used}${p.max ? "/" + p.max : ""}${p.expires ? " · until " + p.expires : ""}</span>
            <span style="display:flex;gap:.4rem">
              <button class="save ghost" style="padding:.3rem .9rem;font-size:.72rem" data-promo="${p.id}" data-active="${p.active ? 1 : 0}">${p.active ? "pause" : "re-enable"}</button>
              <button class="save ghost" style="padding:.3rem .7rem;font-size:.72rem;border-color:var(--oxblood);color:var(--oxblood)" data-del="${p.id}" data-coupon="${p.couponId}">delete</button>
            </span>
          </div>`).join("") : `<p class="small">no codes yet — make one below, it's live in checkout instantly.</p>`;
        el.querySelectorAll("[data-promo]").forEach((b) => {
          b.onclick = async () => {
            b.disabled = true;
            await fetch("/api/admin/promo-toggle", { method: "POST", headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ id: b.dataset.promo, active: b.dataset.active !== "1" }) });
            loadPromos();
          };
        });
        el.querySelectorAll("[data-del]").forEach((b) => {
          b.onclick = async () => {
            if (!confirm("Delete this code for good? Customers can no longer use it.")) return;
            b.disabled = true;
            await fetch("/api/admin/promo-delete", { method: "POST", headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ id: b.dataset.del, couponId: b.dataset.coupon }) });
            loadPromos();
          };
        });
      } catch (e) { el.innerHTML = `<p class="small">promos failed to load</p>`; }
    }

    async function createPromo() {
      const msg = document.getElementById("pc_msg");
      const type = document.getElementById("pc_type").value;
      const val = document.getElementById("pc_value").value;
      const body = {
        code: document.getElementById("pc_code").value,
        maxUses: document.getElementById("pc_max").value || null,
        expiresDays: document.getElementById("pc_days").value || null,
      };
      if (type === "percent") body.percentOff = val; else body.amountOff = val;
      msg.textContent = "creating…";
      try {
        const r = await fetch("/api/admin/promo-create", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body) });
        const d = await r.json();
        if (d.ok) { msg.textContent = `✓ ${d.code} is live`; document.getElementById("pc_code").value = ""; document.getElementById("pc_value").value = ""; loadPromos(); }
        else msg.textContent = d.error || "something went wrong";
      } catch (e) { msg.textContent = "network error — try again"; }
    }

    async function loadStats() {
      const el = document.getElementById("salesBox");
      if (!el) return;
      try {
        const s = await (await fetch("/api/admin/stats")).json();
        if (s.error) { el.querySelector("p").textContent = s.error; return; }
        const eur = (c) => "€" + (c / 100).toFixed(2).replace(".00", "");

        /* KPI tiles with week-over-week deltas */
        const delta = (cur, prev) => {
          if (!prev && !cur) return `<span class="kpi__chip kpi__chip--flat">—</span>`;
          if (!prev) return `<span class="kpi__chip kpi__chip--up">new</span>`;
          const pct = Math.round(((cur - prev) / prev) * 100);
          if (pct === 0) return `<span class="kpi__chip kpi__chip--flat">±0%</span>`;
          return `<span class="kpi__chip ${pct > 0 ? "kpi__chip--up" : "kpi__chip--down"}">${pct > 0 ? "▲" : "▼"} ${Math.abs(pct)}%</span>`;
        };
        const aov = s.week.n ? s.week.cents / s.week.n : 0;
        const prevAov = s.prevWeek.n ? s.prevWeek.cents / s.prevWeek.n : 0;
        const tile = (label, value, chip, sub) => `
          <div class="kpi">
            <span class="kpi__label">${label}</span>
            <span class="kpi__value">${value}</span>
            <span class="kpi__foot">${chip || ""}${sub ? `<span class="kpi__sub">${sub}</span>` : ""}</span>
          </div>`;
        const tiles = `
          <div class="kpi-grid">
            ${tile("revenue · 7d", eur(s.week.cents), delta(s.week.cents, s.prevWeek.cents), "vs prior week")}
            ${tile("orders · 7d", s.week.n, delta(s.week.n, s.prevWeek.n), "vs prior week")}
            ${tile("avg order · 7d", s.week.n ? eur(Math.round(aov)) : "—", s.week.n ? delta(aov, prevAov) : "", s.week.n ? "" : "no orders yet")}
            ${tile("customers", s.customers.n, `<span class="kpi__chip ${s.newCustomers.n ? "kpi__chip--up" : "kpi__chip--flat"}">+${s.newCustomers.n} this week</span>`, `${s.customers.newsletter} on newsletter`)}
          </div>`;

        /* 14-day revenue bars (single series, oxblood, direct label on peak, per-bar tooltip) */
        const days = [];
        for (let i = 13; i >= 0; i--) {
          const dt = new Date(Date.now() - i * 86400000);
          const key = dt.toISOString().slice(0, 10);
          const hit = (s.daily || []).find((r) => r.d === key);
          days.push({ key, label: key.slice(8, 10) + "/" + key.slice(5, 7), cents: hit ? hit.cents : 0, n: hit ? hit.n : 0 });
        }
        const max = Math.max(...days.map((d) => d.cents), 1);
        const W = 560, H = 150, PAD = 6, bw = Math.floor((W - PAD * 2) / 14) - 2;
        const bars = days.map((d, i) => {
          const h = d.cents ? Math.max(Math.round((d.cents / max) * (H - 34)), 3) : 0;
          const x = PAD + i * (bw + 2), y = H - 18 - h;
          const peak = d.cents === max && d.cents > 0;
          return `
            <g>
              <title>${d.label} — ${eur(d.cents)} · ${d.n} order${d.n === 1 ? "" : "s"}</title>
              <rect x="${x}" y="${H - 18 - Math.max(h, 2)}" width="${bw}" height="${Math.max(h, 2)}" rx="3"
                fill="${d.cents ? "var(--oxblood)" : "var(--cream-dim)"}"></rect>
              ${peak ? `<text x="${x + bw / 2}" y="${y - 5}" text-anchor="middle" class="chart__peak">${eur(d.cents)}</text>` : ""}
              ${i % 2 === 0 ? `<text x="${x + bw / 2}" y="${H - 4}" text-anchor="middle" class="chart__tick">${d.label.slice(0, 2)}</text>` : ""}
            </g>`;
        }).join("");
        const allZero = days.every((d) => !d.cents);
        const chart = `
          <div class="chart">
            <div class="chart__head"><span class="kpi__label">revenue — last 14 days</span></div>
            <svg viewBox="0 0 ${W} ${H}" role="img" aria-label="daily revenue, last 14 days" style="width:100%;height:auto;display:block">
              <line x1="${PAD}" y1="${H - 18}" x2="${W - PAD}" y2="${H - 18}" stroke="var(--cream-dim)" stroke-width="2"></line>
              ${bars}
            </svg>
            ${allZero ? `<p class="small" style="margin-top:.4rem">fills in as orders land — every paid order also pings your phones.</p>` : ""}
          </div>`;

        const itemsTag = (o) => {
          try {
            const its = JSON.parse(o.items || "[]");
            const tag = its.map((it) => `${it.q}${(it.sku || it.d || "?")[0].toUpperCase()}`).join(" ");
            return tag ? `<span class="mono" style="opacity:.55;font-size:.72rem">${tag}</span>` : "";
          } catch (e) { return ""; }
        };
        const rows = s.recent.length ? s.recent.map((o) => `
          <div class="row" style="font-size:.85rem">
            <span class="mono" style="opacity:.6">${o.created_at.slice(5, 16)}</span>
            <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${o.name || o.email}${o.city ? " · " + o.city : ""}</span>
            ${itemsTag(o)}
            <span class="mono" style="font-weight:700">${eur(o.amount_total)}${o.mode === "subscription" ? " ↻" : ""}</span>
          </div>`).join("") : "";

        const sz = s.bySize || {};
        const szMax = Math.max(sz.small || 0, sz.medium || 0, sz.large || 0);
        const szBars = szMax ? `
          <div class="chart" style="margin-top:1rem">
            <div class="chart__head"><span class="kpi__label">packs sold by size — 30 days</span></div>
            ${["small","medium","large"].map((k) => `
              <div class="row" style="padding:.25rem 0;gap:.7rem">
                <span class="mono" style="width:4.2rem;font-size:.78rem">${k}</span>
                <span style="flex:1;height:14px;border-radius:4px;background:var(--cream-dim);overflow:hidden">
                  <span style="display:block;height:100%;width:${Math.round(((sz[k] || 0) / szMax) * 100)}%;background:var(--oxblood);border-radius:4px"></span>
                </span>
                <span class="mono" style="font-weight:700;width:2.5rem;text-align:right">${sz[k] || 0}</span>
              </div>`).join("")}
          </div>` : "";
        el.innerHTML = `
          <h2>sales</h2>
          ${tiles}
          ${chart}
          ${szBars}
          ${rows ? `<h2 style="margin-top:1.4rem">recent orders</h2>${rows}` : ""}
          <div class="row" style="margin-top:.8rem"><span class="mono" style="opacity:.6">all time</span><span class="mono" style="font-weight:700">${eur(s.allTime.cents)} · ${s.allTime.n} order${s.allTime.n === 1 ? "" : "s"}</span></div>
          <p class="small">money-truth (refunds, payouts) lives in <a href="https://dashboard.stripe.com/payments" target="_blank" style="text-decoration:underline">Stripe</a> · visitors in <a href="https://dash.cloudflare.com/77f21a888cac91e9fdbbf4d84bd068b1/web-analytics" target="_blank" style="text-decoration:underline">web analytics</a>.</p>`;
      } catch (e) { el.querySelector("p").textContent = "stats failed to load"; }
    }

    render(st);
  })();
  </script>
</body>
</html>
