<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>my account — mira tortillas</title>
  <meta name="robots" content="noindex">
  <link rel="icon" type="image/png" href="/assets/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css?v=54">
  <style>
    body { cursor: auto; }
    .acct { max-width: 860px; margin: 0 auto; padding: 1.4rem var(--pad) 5rem; }
    .acct__nav { display: flex; align-items: center; justify-content: space-between; padding: .4rem 0 2.2rem; }
    .acct__nav img { height: clamp(26px, 3.4vw, 34px); width: auto; }
    .acct__nav a.back { font-family: var(--font-mono); font-size: .85rem; text-decoration: underline; text-underline-offset: .25em; }
    .acct__hi { font-size: clamp(2.2rem, 6vw, 3.6rem); font-weight: 700; letter-spacing: -.03em; line-height: 1.05; margin-bottom: .4rem; }
    .acct__sub { font-family: var(--font-mono); font-size: .8rem; text-transform: uppercase; letter-spacing: .12em; opacity: .6; margin-bottom: 2rem; }
    .acct__points {
      display: inline-flex; align-items: baseline; gap: .6rem;
      border: 3px solid var(--ink); border-radius: 999px;
      padding: .7rem 1.4rem; margin-bottom: 2.4rem; background: var(--masa);
    }
    .acct__points b { font-size: 1.6rem; font-weight: 700; }
    .acct__points span { font-family: var(--font-mono); font-size: .75rem; text-transform: uppercase; letter-spacing: .12em; }
    .acct__grid { display: grid; gap: 1.2rem; }
    .acct__card { border: 3px solid var(--ink); border-radius: var(--radius); padding: 1.3rem 1.5rem; background: #fff; }
    .acct__card h2 { font-size: 1.15rem; font-weight: 700; letter-spacing: -.01em; margin-bottom: .9rem; }
    .acct__card h2 small { font-family: var(--font-mono); font-weight: 400; font-size: .7rem; text-transform: uppercase; letter-spacing: .12em; opacity: .55; margin-left: .5rem; }
    .acct__row { display: flex; justify-content: space-between; gap: 1rem; padding: .55rem 0; border-bottom: 2px solid var(--cream-dim); font-size: .92rem; }
    .acct__row:last-child { border-bottom: 0; }
    .acct__row .mono { font-size: .8rem; opacity: .75; white-space: nowrap; }
    .acct__empty { font-family: var(--font-mono); font-size: .8rem; opacity: .6; }
    .acct__note { margin-top: 2rem; font-family: var(--font-mono); font-size: .78rem; line-height: 1.7; opacity: .65; }
    .acct__logout { margin-top: 1.4rem; background: none; border: 0; font-family: var(--font-mono); font-size: .8rem; text-decoration: underline; text-underline-offset: .25em; cursor: pointer; color: var(--ink); }
    .acct__login { text-align: center; padding: 4rem 0; }
    .acct__login p { max-width: 42ch; margin: 0 auto 1.6rem; line-height: 1.6; }
    .pill { display: inline-block; font-family: var(--font-mono); font-size: .68rem; text-transform: uppercase; letter-spacing: .1em; border: 2px solid var(--ink); border-radius: 999px; padding: .15rem .6rem; }
    .pill--on { background: var(--oxblood); color: var(--cream); border-color: var(--oxblood); }
    .subbtn {
      font-family: var(--font-mono); font-size: .72rem; text-transform: uppercase; letter-spacing: .08em;
      border: 2px solid var(--ink); border-radius: 999px; background: none; color: var(--ink);
      padding: .3rem .8rem; cursor: pointer; transition: background .2s, color .2s;
    }
    .subbtn:hover { background: var(--ink); color: var(--cream); }
    .subbtn--warn:hover { background: var(--oxblood); border-color: var(--oxblood); color: var(--cream); }
    .pf-grid { display: grid; gap: .8rem; grid-template-columns: 1fr 1fr; }
    @media (max-width: 560px) { .pf-grid { grid-template-columns: 1fr; } }
    .acct__layout { display: grid; grid-template-columns: 190px 1fr; gap: 1.6rem; align-items: start; }
    .acct__tabs { display: flex; flex-direction: column; gap: .45rem; position: sticky; top: 1rem; }
    .acct__tabs [data-tab] {
      font-family: var(--font-mono); font-size: .78rem; text-transform: uppercase; letter-spacing: .08em;
      text-align: left; background: none; border: 3px solid var(--ink); border-radius: 999px;
      padding: .55rem 1rem; cursor: pointer; color: var(--ink); transition: background .15s;
      display: flex; flex-direction: column; gap: .05rem;
    }
    .acct__tabs [data-tab] small { font-size: .58rem; opacity: .55; letter-spacing: .12em; }
    .acct__tabs [data-tab]:hover { background: var(--masa); }
    .acct__tabs [data-tab].is-on { background: var(--ink); color: var(--cream); box-shadow: 4px 4px 0 var(--oxblood); }
    .acct__tabs .acct__logout { margin-top: .8rem; text-align: left; }
    .acct__panes { min-width: 0; }
    @media (max-width: 700px) {
      .acct__layout { grid-template-columns: 1fr; }
      .acct__tabs { position: static; flex-direction: row; flex-wrap: nowrap; overflow-x: auto; padding-bottom: .4rem; }
      .acct__tabs [data-tab] { flex: 0 0 auto; padding: .45rem .9rem; }
      .acct__tabs [data-tab] small { display: none; }
      .acct__tabs .acct__logout { margin: 0 0 0 auto; flex: 0 0 auto; white-space: nowrap; }
    }
  </style>
</head>
<body>
  <div class="acct">
    <div class="acct__nav">
      <a href="/"><img src="assets/mira-wordmark.png" alt="mira"></a>
      <a class="back" href="/">← back to site / voltar</a>
    </div>
    <div id="content"><p class="acct__empty">loading…</p></div>
  </div>

  <script>
  (async function () {
    const box = document.getElementById("content");
    const eur = (cents) => "€" + (cents / 100).toFixed(2).replace(".00", "");
    let me;
    try { me = await (await fetch("/api/me")).json(); } catch (e) { me = { loggedIn: false }; }

    if (!me.loggedIn) {
      box.innerHTML = `
        <div class="acct__login">
          <h1 class="acct__hi">sign in.</h1>
          <p class="acct__empty" style="margin-bottom:1.6rem">we email you a code, no passwords · enviamos-te um código por email, sem passwords</p>
          <form id="loginForm" style="max-width:340px;margin:0 auto;display:grid;gap:.7rem">
            <input id="loginEmail" type="email" placeholder="email" autocomplete="email" required
              style="font-family:var(--font-mono);font-size:.95rem;padding:.85rem 1rem;border:3px solid var(--ink);border-radius:12px;background:#fff;width:100%">
            <label style="display:flex;align-items:flex-start;gap:.5rem;font-family:var(--font-mono);font-size:.72rem;line-height:1.5;text-align:left;cursor:pointer">
              <input type="checkbox" id="loginNews" style="margin-top:.15rem;accent-color:var(--oxblood)">
              <span>email me about drops &amp; news · quero receber novidades</span>
            </label>
            <button class="btn btn--green" id="sendCode" type="submit" style="justify-content:center;width:100%">send code · enviar</button>
            <div id="codeRow" style="display:none;gap:.7rem">
              <input id="loginCode" inputmode="numeric" maxlength="6" placeholder="123456" autocomplete="one-time-code"
                style="font-family:var(--font-mono);font-size:1.3rem;letter-spacing:.4em;text-align:center;padding:.85rem 1rem;border:3px solid var(--ink);border-radius:12px;background:#fff;width:100%">
              <button class="btn btn--ink" id="verifyCode" type="submit" style="justify-content:center;width:100%">sign in · entrar</button>
              <button type="button" id="resendCode" style="background:none;border:0;font-family:var(--font-mono);font-size:.75rem;text-decoration:underline;text-underline-offset:.25em;cursor:pointer;color:var(--ink);opacity:.7;padding:.2rem">didn't get it? resend · reenviar</button>
            </div>
            <p id="loginMsg" class="acct__empty" style="min-height:1.2em"></p>
          </form>
        </div>`;

      const msg = () => document.getElementById("loginMsg");
      let codeStep = false, busy = false;
      const setBusy = (b) => {
        busy = b;
        document.getElementById("sendCode").disabled = b;
        const vc = document.getElementById("verifyCode"); if (vc) vc.disabled = b;
      };
      const sendCode = async (resend) => {
        const email = document.getElementById("loginEmail").value.trim();
        if (!email) { msg().textContent = "enter your email first · escreve o teu email"; return; }
        setBusy(true); msg().textContent = resend ? "sending a new code…" : "sending…";
        try {
          const r = await fetch("/api/login-request", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ email }) });
          const d = await r.json();
          if (d.ok) {
            codeStep = true;
            document.getElementById("sendCode").style.display = "none";
            document.getElementById("codeRow").style.display = "grid";
            const cf = document.getElementById("loginCode");
            cf.value = ""; cf.focus();
            msg().textContent = resend
              ? "new code sent, check your inbox (and spam) · novo código enviado"
              : "code sent, good for 30 min, no rush · código válido 30 min";
          } else msg().textContent = d.error || "something went wrong";
        } catch (e) { msg().textContent = "network error, try again · erro de rede"; }
        finally { setBusy(false); }
      };
      /* resend with a short cooldown so a double-tap can't burn the rate limit */
      let resendCooling = false;
      const resendBtn = document.getElementById("resendCode");
      if (resendBtn) resendBtn.addEventListener("click", () => {
        if (busy || resendCooling) return;
        resendCooling = true; resendBtn.style.opacity = ".35";
        sendCode(true);
        setTimeout(() => { resendCooling = false; resendBtn.style.opacity = ".7"; }, 15000);
      });
      const verifyCode = async () => {
        const email = document.getElementById("loginEmail").value.trim();
        const code = document.getElementById("loginCode").value.trim();
        setBusy(true); msg().textContent = "checking…";
        try {
          const newsletter = !!document.getElementById("loginNews")?.checked;
          const r = await fetch("/api/login-verify", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ email, code, newsletter }) });
          const d = await r.json();
          if (d.ok) location.reload();
          else { msg().textContent = d.error || "wrong code"; setBusy(false); }
        } catch (e) { msg().textContent = "network error — try again"; setBusy(false); }
      };
      document.getElementById("loginForm").addEventListener("submit", (ev) => {
        ev.preventDefault();
        if (busy) return;
        if (codeStep && document.getElementById("loginCode").value.trim()) verifyCode();
        else sendCode();
      });
      return;
    }

    const c = me.customer;
    const esc = (v) => String(v == null ? "" : v).replace(/&/g, "&amp;").replace(/"/g, "&quot;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    const firstName = esc((c.name || c.email).split(" ")[0]);
    const field = (id, label, value, extra) => `
      <label style="display:grid;gap:.25rem;font-family:var(--font-mono);font-size:.68rem;text-transform:uppercase;letter-spacing:.1em;opacity:.85">${label}
        <input id="pf_${id}" value="${esc(value)}" ${extra || ""}
          style="font-family:var(--font-mono);font-size:.9rem;padding:.6rem .8rem;border:3px solid var(--ink);border-radius:12px;background:#fff;width:100%;text-transform:none;letter-spacing:0">
      </label>`;

    const subActions = (s) => {
      if (s.status !== "active" && s.status !== "past_due" && !s.paused) return "";
      if (s.cancelAtEnd) return `<button class="subbtn" data-sub="${s.id}" data-act="keep">keep it · manter</button>`;
      if (s.paused) return `<button class="subbtn" data-sub="${s.id}" data-act="resume">resume · retomar</button>`;
      return `<button class="subbtn" data-sub="${s.id}" data-act="pause">pause · pausar</button>
              <button class="subbtn subbtn--warn" data-sub="${s.id}" data-act="cancel">cancel · cancelar</button>`;
    };
    const subsHtml = me.subscriptions.length
      ? me.subscriptions.map((s) => `
          <div class="acct__row" style="flex-wrap:wrap">
            <span>${s.plan || "subscription"} <span class="pill ${s.status === "active" && !s.paused && !s.cancelAtEnd ? "pill--on" : ""}">${s.paused ? "paused" : s.cancelAtEnd ? "ending" : s.status}</span></span>
            <span class="mono">${s.amount ? eur(s.amount) : ""} / ${s.interval || ""}${s.renews ? (s.cancelAtEnd ? " · ends: " : " · next: ") + s.renews : ""}</span>
            <span style="flex-basis:100%;display:flex;gap:.5rem;margin-top:.4rem">${subActions(s)}</span>
          </div>`).join("")
      : me.subsError
        ? `<p class="acct__empty">couldn't reach the subscription service just now — refresh in a moment / não foi possível carregar, tenta daqui a pouco</p>`
        : `<p class="acct__empty">no subscription yet / ainda sem subscrição</p>`;

    const ordersHtml = me.orders.length
      ? me.orders.map((o) => `
          <div class="acct__row">
            <span>${o.created_at.slice(0, 10)} · ${o.mode === "subscription" ? "subscription" : "order"}</span>
            <span class="mono">${eur(o.amount_total)} · +${o.points_earned} pts</span>
          </div>`).join("")
      : `<p class="acct__empty">no orders yet / ainda sem encomendas</p>`;

    const lastOrder = me.orders[0];
    box.innerHTML = `
      <h1 class="acct__hi">olá, ${firstName}.</h1>
      <p class="acct__sub">${c.email}</p>
      <div class="acct__layout">
        <nav class="acct__tabs" id="acctTabs" aria-label="account sections">
          <button data-tab="overview" class="is-on">overview <small>resumo</small></button>
          <button data-tab="orders">orders <small>encomendas</small></button>
          <button data-tab="subs">subscriptions <small>subscrições</small></button>
          <button data-tab="profile">profile <small>perfil</small></button>
          <button data-tab="payments">payments <small>pagamentos</small></button>
          <button class="acct__logout" id="logout">log out / sair</button>
        </nav>
        <div class="acct__panes">
          <section data-pane="overview">
            <div class="acct__points"><b>${c.points}</b><span>points / pontos</span></div>
            <p class="acct__empty" style="margin:-1.4rem 0 1.6rem">100 points = €8 off, tick "use points" in the cart / 100 pontos = €8 de desconto, marca «usar 100 pontos» no carrinho</p>
            <div class="acct__card">
              <h2>at a glance <small>num relance</small></h2>
              <div class="acct__row"><span>orders / encomendas</span><span class="mono">${me.orders.length}</span></div>
              <div class="acct__row"><span>subscriptions / subscrições</span><span class="mono">${me.subscriptions.length || "—"}</span></div>
              <div class="acct__row"><span>last order / última</span><span class="mono">${lastOrder ? lastOrder.created_at.slice(0, 10) + " · " + eur(lastOrder.amount_total) : "—"}</span></div>
            </div>
          </section>
          <section data-pane="orders" hidden>
            <div class="acct__card">
              <h2>orders <small>encomendas</small></h2>
              ${ordersHtml}
            </div>
          </section>
          <section data-pane="subs" hidden>
            <div class="acct__card">
              <h2>subscriptions <small>subscrições</small></h2>
              ${subsHtml}
              <p class="acct__empty" style="margin-top:.8rem">want a standing weekly box? email <a href="mailto:ola@miratortillas.pt" style="text-decoration:underline">ola@miratortillas.pt</a> / queres uma caixa semanal? escreve-nos</p>
            </div>
          </section>
          <section data-pane="profile" hidden>
            <div class="acct__card">
              <h2>profile <small>perfil — share what you like, all optional</small></h2>
              <form id="profileForm" autocomplete="on">
              <div class="pf-grid">
                ${field("name", "name / nome", c.name, 'autocomplete="name"')}
                ${field("phone", "phone / telemóvel", c.phone, 'autocomplete="tel" inputmode="tel"')}
                ${field("line1", "address / morada", c.address.line1, 'autocomplete="address-line1"')}
                ${field("line2", "address 2 (optional)", c.address.line2, 'autocomplete="address-line2"')}
                ${field("postal", "postal code / código postal", c.address.postal_code, 'autocomplete="postal-code"')}
                ${field("city", "city / cidade", c.address.city, 'autocomplete="address-level2"')}
                ${(() => {
                  /* day+month only: two taps beats scrolling a calendar back 30 years,
                     and the birthday treat never needed the year anyway */
                  const bd = String(c.birthday || "");
                  const m = bd.match(/^(?:\d{4}-)?(\d{2})-(\d{2})$/); /* accepts legacy YYYY-MM-DD too */
                  const selMonth = m ? m[1] : "", selDay = m ? m[2] : "";
                  const months = ["jan", "fev", "mar", "abr", "mai", "jun", "jul", "ago", "set", "out", "nov", "dez"];
                  const selStyle = 'style="font-family:var(--font-mono);font-size:.9rem;padding:.6rem .8rem;border:3px solid var(--ink);border-radius:12px;background:#fff;width:100%;text-transform:none;letter-spacing:0"';
                  return `<label style="display:grid;gap:.25rem;font-family:var(--font-mono);font-size:.68rem;text-transform:uppercase;letter-spacing:.1em;opacity:.85">birthday / aniversário 🎁
                    <span style="display:grid;grid-template-columns:1fr 1.4fr;gap:.5rem">
                      <select id="pf_bday_d" ${selStyle}><option value="">dia</option>${Array.from({ length: 31 }, (_, i) => { const d = String(i + 1).padStart(2, "0"); return `<option value="${d}" ${d === selDay ? "selected" : ""}>${i + 1}</option>`; }).join("")}</select>
                      <select id="pf_bday_m" ${selStyle}><option value="">mês</option>${months.map((mo, i) => { const v2 = String(i + 1).padStart(2, "0"); return `<option value="${v2}" ${v2 === selMonth ? "selected" : ""}>${mo}</option>`; }).join("")}</select>
                    </span>
                  </label>`;
                })()}
              </div>
              <p class="acct__empty" style="margin-top:.6rem">birthday = a little something from us · no teu aniversário há mimo</p>
              <label style="display:flex;align-items:center;gap:.55rem;margin-top:.8rem;font-family:var(--font-mono);font-size:.78rem;cursor:pointer">
                <input type="checkbox" id="pf_news" ${c.newsletter ? "checked" : ""} style="accent-color:var(--oxblood)">
                <span>email me about drops &amp; news · quero receber novidades</span>
              </label>
              <div style="display:flex;align-items:center;gap:1rem;margin-top:.9rem">
                <button class="btn btn--ink" id="saveProfile" type="submit" style="justify-content:center">save · guardar</button>
                <span id="profileMsg" class="acct__empty"></span>
              </div>
              </form>
            </div>
          </section>
          <section data-pane="payments" hidden>
            <div class="acct__card">
              <h2>payment methods <small>pagamentos</small></h2>
              <p class="acct__empty" style="margin-bottom:.8rem">cards are stored safely by stripe — manage them there / os cartões ficam na stripe — gere-os lá</p>
              <div style="display:flex;align-items:center;gap:1rem">
                <button class="btn btn--ink" id="openPortal" style="justify-content:center">manage payments · gerir</button>
                <span id="portalMsg" class="acct__empty"></span>
              </div>
            </div>
          </section>
          <p class="acct__note">
            anything else — message us on instagram
            <a href="https://instagram.com/miratortillas" target="_blank" rel="noopener" style="text-decoration:underline">@miratortillas</a>
            or email <a href="mailto:ola@miratortillas.pt" style="text-decoration:underline">ola@miratortillas.pt</a>.<br>
            outra coisa qualquer? manda mensagem ou escreve para ola@miratortillas.pt.
          </p>
        </div>
      </div>`;

    const tabs = document.querySelectorAll("#acctTabs [data-tab]");
    const showTab = (name) => {
      tabs.forEach((t) => t.classList.toggle("is-on", t.dataset.tab === name));
      document.querySelectorAll("[data-pane]").forEach((p) => { p.hidden = p.dataset.pane !== name; });
      history.replaceState(null, "", "#" + name);
    };
    tabs.forEach((t) => t.addEventListener("click", () => showTab(t.dataset.tab)));
    if (location.hash && document.querySelector(`[data-pane="${location.hash.slice(1)}"]`)) showTab(location.hash.slice(1));

    document.getElementById("logout").addEventListener("click", async () => {
      await fetch("/api/logout", { method: "POST" });
      location.href = "/";
    });

    document.getElementById("profileForm").addEventListener("submit", async (ev) => {
      ev.preventDefault();
      const v = (id) => document.getElementById("pf_" + id).value;
      const msg = document.getElementById("profileMsg");
      msg.textContent = "saving…";
      try {
        const r = await fetch("/api/profile", { method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name: v("name"), phone: v("phone"), line1: v("line1"), line2: v("line2"),
            postal_code: v("postal"), city: v("city"),
            birthday: (v("bday_m") && v("bday_d")) ? `${v("bday_m")}-${v("bday_d")}` : "",
            newsletter: !!document.getElementById("pf_news")?.checked }) });
        const d = await r.json();
        msg.textContent = d.ok ? "saved ✓ / guardado ✓" : (d.error || "something went wrong");
      } catch (e) { msg.textContent = "network error — try again"; }
    });

    document.getElementById("openPortal").addEventListener("click", async () => {
      const msg = document.getElementById("portalMsg");
      msg.textContent = "opening…";
      try {
        const r = await fetch("/api/portal", { method: "POST" });
        const d = await r.json();
        if (d.url) location.href = d.url;
        else msg.textContent = d.error || "something went wrong";
      } catch (e) { msg.textContent = "network error — try again"; }
    });

    document.querySelectorAll(".subbtn").forEach((b) => {
      b.addEventListener("click", async () => {
        const act = b.dataset.act;
        const asks = {
          cancel: "cancel this subscription at the end of the current period? / cancelar no fim do período atual?",
          pause: "pause deliveries until you resume? / pausar entregas até retomares?",
          resume: "resume deliveries? / retomar entregas?",
          keep: "keep the subscription going? / manter a subscrição?",
        };
        if (!confirm(asks[act])) return;
        b.disabled = true; b.textContent = "…";
        const r = await fetch("/api/sub-action", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ id: b.dataset.sub, action: act }) });
        const d = await r.json();
        if (d.ok) location.reload();
        else { alert(d.error || "something went wrong"); b.disabled = false; }
      });
    });
  })();
  </script>
</body>
</html>
